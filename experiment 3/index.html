<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Experiment 3 - CSS Demo</title>
  <style>
    /* i. Different font and text styles */
    body {
      font-family: Arial, sans-serif;
      color: #222;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      font-family: 'Georgia', serif;
      font-size: 2.5em;
      font-style: italic;
      text-shadow: 2px 2px 5px #555;
    }

    .highlight {
      font-weight: bold;
      color: darkred;
      text-decoration: underline;
    }

    /* ii. Background image for page and element */
    body {
      background-image: url('background.jpg');
      background-size: cover;
      background-attachment: fixed;
    }

    .layer-box {
      background-image: url('element-bg.png');
      background-size: contain;
      background-repeat: no-repeat;
      padding: 20px;
      margin: 30px auto;
      width: 300px;
      border: 2px solid #333;
    }

    /* iii. Styles for links */
    a {
      color: navy;
      text-decoration: none;
      font-size: 1.2em;
    }

    a:hover {
      color: orange;
      text-decoration: underline;
    }

    /* iv. Working with layers */
    .layer-box {
      position: relative;
      z-index: 10; /* brings it above other elements */
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 1; 
    }

   
    body {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Styled Page</h1>
  
  <p>This is a demonstration of <span class="highlight">CSS styling</span> with fonts, backgrounds, links, layers, and cursors.</p>
  
  <a href="https://www.google.com">Visit Example</a>
  
  <div class="layer-box">
    <p>This box is layered above the background.</p>
  </div>
</body>
</html>
