<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .con {
            height: 100vh;
            width: 100vw;
            background-color: rgb(227, 241, 227);
            display: flex;
        }

        .box {
            margin: auto;
            width: 400px;
            height: 620px;
            background-color: rgba(119, 118, 118, 0.411);
            border-radius: 10px;
            margin-top: 100px;
            display: flex;
            flex-direction: column;
        }

        .brand {
            color: rgb(5, 5, 5);
            font-size: 80px;
            font-weight: 900;
            margin: 20px auto;
        }

        .brand:hover {
            transform: scale(1.1);
            color: rgb(0, 255, 0);
        }

        .email,
        .password,
        .name,
        .mobile {
            border: 1px solid white;
            border-radius: 5px;
            background-color: rgba(0, 0, 0, 0.111);
            height: 30px;
            margin: 10px 15px;
            padding: 10px;
            color: white;
        }

        .btn {
            padding: 10px;
            width: 150px;
            margin: 10px auto;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .btn:hover {
            transform: scale(1.05);
            color: white;
            background-color: black;
            border: 1px solid white;
        }

        .do {
            color: grey;
            margin: 10px auto;
        }

        .sing {
            color: white;
            font-size: 18px;
            margin: 0px auto;
        }

        .sing:hover {
            color: rgb(0, 255, 0);
            transform: scale(1.09);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="con">
        <div class="box">
            <div class="brand">Book Store</div>
            <input required class="name" type="text" name="name" id="name" placeholder="Name">
            <input required class="mobile" type="text" name="mobile" id="mobile" placeholder="Mobile no.">
            <input required class="email" type="email" name="email" id="email" placeholder="Email">
            <input required class="password" type="password" placeholder="Password">
            <input required class="cfmpassword password" type="password" placeholder="Confirm Password">
            <button class="btn">Sing Up</button>
            <div class="do">Already have an account</div>
            <div class="sing">Log In</div>
        </div>
    </div>
    <script>

        let email = document.getElementsByClassName("email")[0]
        let password = document.getElementsByClassName("password")[0]
        let cfmpassword = document.getElementsByClassName("cfmpassword")[0]
        let name = document.getElementsByClassName("name")[0]
        let mobile = document.getElementsByClassName("mobile")[0]
        let btn = document.getElementsByClassName("btn")[0]

        btn.addEventListener("click", login)



        function login() {
            let emailvalue = email.value
            if (emailvalue === "" || !emailvalue.includes("@") || !emailvalue.includes(".")) {
                alert("Enter valid email. Example ajay@gmail.com")
            }

            let passwordvalue = password.value
            console.log(passwordvalue)

            if (passwordvalue.length < 8) {
                alert("password length should be greater than 8")
            }

            else if (!/[A-Z]/.test(passwordvalue) || !/[!@#$%^&*]/.test(passwordvalue)) {
                alert("Password must contain uppercase & special character")
            }

            let namevalue = name.value;

            let a = false;

            for (let i = 0; i < namevalue.length; i++) {
                let ch = namevalue[i];

                if (
                    !((ch >= "a" && ch <= "z") ||
                        (ch >= "A" && ch <= "Z") ||
                        ch === " ")
                ) {
                    a = true;
                    break;
                }
            }

            if (a) {

                alert("Name should include only alphabets and space");
            }

           let mobilevalue = mobile.value;

if (mobilevalue.length !== 10) {
    alert("Mobile number must be 10 digits");
} else {
    let a = false;

    for (let i = 0; i < mobilevalue.length; i++) {
        let m = mobilevalue[i];

        if (m < '0' || m > '9') {
            a = true;
            break;
        }
    }

    if (a) {
        alert("Mobile number should contain only digits");
    }
}

let cfmpasswordvalue = cfmpassword.value

if(passwordvalue!==cfmpasswordvalue) {
    alert("confirm password  and password should be same")
}

        }

    </script>
</body>

</html>
